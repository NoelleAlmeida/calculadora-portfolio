<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="shortcut icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="calculator">
        <div class="top-bar">
          <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
            🌙
          </button>
        </div>

        <h1>Calculadora</h1>

        <input type="text" id="display" disabled />

        <div class="scientific-buttons hidden" id="scientificButtons">
          <button class="btn scientific" onclick="appendValue('(')">(</button>
          <button class="btn scientific" onclick="appendValue(')')">)</button>
          <button class="btn scientific" onclick="appendValue('π')">π</button>
          <button class="btn scientific" onclick="appendValue('^2')">x²</button>

          <button class="btn scientific" onclick="appendValue('^')">xʸ</button>
          <button class="btn scientific" onclick="appendFunction('sqrt(')">
            √
          </button>
          <button class="btn scientific" onclick="appendFunction('log(')">
            log
          </button>
          <button class="btn scientific" onclick="appendFunction('ln(')">
            ln
          </button>

          <button class="btn scientific" onclick="appendFunction('sin(')">
            sin
          </button>
          <button class="btn scientific" onclick="appendFunction('cos(')">
            cos
          </button>
          <button class="btn scientific" onclick="appendFunction('tan(')">
            tan
          </button>
          <button class="btn scientific" onclick="appendFunction('abs(')">
            abs
          </button>
        </div>

        <div class="buttons">
          <button class="btn clear" onclick="clearDisplay()">C</button>
          <button class="btn delete" onclick="deleteLast()">⌫</button>
          <button class="btn percent" onclick="applyPercent()">%</button>
          <button class="btn operator" onclick="appendValue('/')">÷</button>

          <button class="btn" onclick="appendValue('7')">7</button>
          <button class="btn" onclick="appendValue('8')">8</button>
          <button class="btn" onclick="appendValue('9')">9</button>
          <button class="btn operator" onclick="appendValue('*')">×</button>

          <button class="btn" onclick="appendValue('4')">4</button>
          <button class="btn" onclick="appendValue('5')">5</button>
          <button class="btn" onclick="appendValue('6')">6</button>
          <button class="btn operator" onclick="appendValue('-')">−</button>

          <button class="btn" onclick="appendValue('1')">1</button>
          <button class="btn" onclick="appendValue('2')">2</button>
          <button class="btn" onclick="appendValue('3')">3</button>
          <button class="btn operator" onclick="appendValue('+')">+</button>

          <button
            class="btn scientific-toggle-btn"
            onclick="toggleScientificMode()"
            id="scientificToggle"
            title="Abrir modo científico"
          >
            ƒx
          </button>
          <button class="btn" onclick="appendValue('0')">0</button>
          <button class="btn" onclick="appendValue('.')">.</button>
          <button class="btn equal" onclick="calculate()">=</button>
        </div>
      </section>

      <footer class="footer">
        <div class="footer-top">
          <p>Feito com 💙 por Noelle Almeida</p>
          <a href="about.html" class="footer-link">Sobre</a>
        </div>
        <span>Projeto de portfólio em HTML, CSS e JavaScript</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
